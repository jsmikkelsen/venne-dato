<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hvornår kan vi mødes?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Lille animation til valgte datoer */
        .date-btn-selected {
            background-color: #10b981 !important;
            color: #ffffff !important;
            border-color: #10b981 !important;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700 my-8">
        <!-- HEADER -->
        <h1 class="text-3xl font-bold text-center text-emerald-400 mb-6">📅 Venne-Dato</h1>

        <!-- ADMIN/OPRET PANEL -->
        <div id="admin-panel" class="space-y-4">
            <h2 class="text-xl font-semibold text-gray-200">Opret ny afstemning</h2>
            <div>
                <label class="block text-sm font-medium mb-1">Hvad skal vi?</label>
                <input type="text" id="poll-title" placeholder="F.eks. Sommerhustur 🏖️" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-2">Klik på de datoer, du vil foreslå:</label>
                
                <!-- MÅNEDSSKIFT & KALENDER -->
                <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                    <div class="flex justify-between items-center mb-4">
                        <button onclick="changeMonth(-1)" class="px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded text-xs">◀ Forrige</button>
                        <span id="calendar-month-year" class="font-bold text-emerald-400"></span>
                        <button onclick="changeMonth(1)" class="px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded text-xs">Næste ▶</button>
                    </div>
                    
                    <!-- Ugedage overskrifter -->
                    <div class="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 font-semibold mb-2">
                        <div>Ma</div><div>Ti</div><div>On</div><div>To</div><div>Fr</div><div>Lø</div><div>Sø</div>
                    </div>
                    
                    <!-- Kalenderdage -->
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
                </div>

                <div class="mt-3 text-xs text-gray-400">
                    Valgte datoer: <span id="selected-dates-count" class="text-emerald-400 font-bold">0</span>
                </div>
            </div>

            <button onclick="createPoll()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold p-3 rounded-lg transition-colors mt-4">Opret Afstemning & Hent Link</button>
            
            <div id="share-section" class="hidden mt-6 p-4 bg-gray-700 rounded-lg border border-emerald-500">
                <p class="text-emerald-400 font-bold mb-1 text-sm">Send dette link til vennerne:</p>
                <input type="text" id="share-link" readonly class="w-full p-2 bg-gray-800 rounded border border-gray-600 text-sm mb-2 text-white">
                <button onclick="copyLink()" class="text-xs bg-emerald-500 px-3 py-1.5 rounded font-bold hover:bg-emerald-600 transition">Kopier Link</button>
            </div>
        </div>

        <!-- STEMME PANEL -->
        <div id="vote-panel" class="hidden space-y-6">
            <h2 id="vote-title" class="text-2xl font-bold text-center text-white">Indlæser...</h2>
            
            <!-- Stemme-formular -->
            <div class="bg-gray-700 p-4 rounded-lg border border-gray-600 space-y-4">
                <h3 class="font-semibold text-emerald-400">Afgiv din stemme</h3>
                <div>
                    <label class="block text-xs font-medium mb-1">Dit Navn</label>
                    <input type="text" id="voter-name" placeholder="Skriv dit navn her..." class="w-full p-2.5 rounded bg-gray-800 border border-gray-600 text-white">
                </div>
                
                <div id="date-checkboxes" class="space-y-2">
                    <!-- Datoer loades dynamisk her -->
                </div>
                <button onclick="submitVote()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold p-2.5 rounded transition">Gem min stemme</button>
            </div>

            <!-- Nuværende stilling -->
            <div>
                <h3 class="font-semibold text-gray-200 mb-3">Hvem kan hvornår?</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-gray-700">
                                <th class="py-2">Dato</th>
                                <th class="py-2">Hvem kan?</th>
                                <th class="py-2 text-center">Antal</th>
                            </tr>
                        </thead>
                        <tbody id="results-table">
                            <!-- Resultater loades dynamisk her -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = window.location.origin;
        const urlParams = new URLSearchParams(window.location.search);
        const pollId = urlParams.get('poll');

        // Kalender tilstand
        let currentDate = new Date();
        const selectedDates = new Set(); // Indeholder datoer i 'YYYY-MM-DD' format

        // Initialisering
        if (pollId) {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('vote-panel').classList.remove('hidden');
            loadPoll(pollId);
        } else {
            renderCalendar();
        }

        // --- KALENDER SYSTEM ---
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Måned overskrift
            const monthNames = ["Januar", "Februar", "Marts", "April", "Maj", "Juni", "Juli", "August", "September", "Oktober", "November", "December"];
            document.getElementById('calendar-month-year').innerText = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Find første dag i måneden (0 = Søndag, 1 = Mandag osv. -> Vi vil have Mandag som første kolonne)
            let firstDayIndex = new Date(year, month, 1).getDay() - 1;
            if (firstDayIndex === -1) firstDayIndex = 6; // Søndag rykkes til bunden

            // Find antal dage i måneden
            const totalDays = new Date(year, month + 1, 0).getDate();

            // Tomme felter inden den 1. i måneden
            for (let i = 0; i < firstDayIndex; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }

            // Byg dagene
            for (let day = 1; day <= totalDays; day++) {
                const button = document.createElement('button');
                button.type = "button";
                button.innerText = day;
                
                // Generer YYYY-MM-DD streng
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                button.dataset.date = dateStr;

                button.className = "p-2 text-sm rounded border border-gray-600 bg-gray-800 hover:bg-gray-600 transition-all font-medium text-center";

                // Hvis datoen allerede er valgt, giv den klassen med det samme
                if (selectedDates.has(dateStr)) {
                    button.classList.add('date-btn-selected');
                }

                // Klik event
                button.onclick = () => toggleDateSelection(button, dateStr);

                grid.appendChild(button);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function toggleDateSelection(element, dateStr) {
            if (selectedDates.has(dateStr)) {
                selectedDates.delete(dateStr);
                element.classList.remove('date-btn-selected');
            } else {
                selectedDates.add(dateStr);
                element.classList.add('date-btn-selected');
            }
            document.getElementById('selected-dates-count').innerText = selectedDates.size;
        }

        // --- OPRET AFSTEMNING ---
        async function createPoll() {
            const title = document.getElementById('poll-title').value.trim();
            const dates = Array.from(selectedDates).sort(); // Sorter datoer kronologisk

            if (!title || dates.length === 0) {
                alert('Udfyld venligst en titel og vælg mindst én dato i kalenderen.');
                return;
            }

            const res = await fetch(`${API_URL}/api/polls`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, dates })
            });
            const data = await res.json();

            if (data.id) {
                const shareLink = `${window.location.origin}/?poll=${data.id}`;
                document.getElementById('share-link').value = shareLink;
                document.getElementById('share-section').classList.remove('hidden');
            }
        }

        function copyLink() {
            const copyText = document.getElementById('share-link');
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert('Linket er kopieret til udklipsholderen!');
        }

        // --- STEMMESIDE LOGIK ---
        async function loadPoll(id) {
            const res = await fetch(`${API_URL}/api/polls/${id}`);
            if (!res.ok) {
                document.getElementById('vote-title').innerText = "Afstemningen blev ikke fundet 😢";
                return;
            }
            const poll = await res.json();
            
            document.getElementById('vote-title').innerText = poll.title;

            // Afkrydsningsfelter
            const checkboxContainer = document.getElementById('date-checkboxes');
            checkboxContainer.innerHTML = '';
            poll.dates.forEach(d => {
                const label = document.createElement('label');
                label.className = 'flex items-center space-x-3 bg-gray-800 p-2.5 rounded cursor-pointer border border-gray-700 hover:border-emerald-500';
                label.innerHTML = `
                    <input type="checkbox" value="${d.date}" class="poll-checkbox form-checkbox h-5 w-5 text-emerald-500 rounded focus:ring-0">
                    <span class="text-white">${formatDate(d.date)}</span>
                `;
                checkboxContainer.appendChild(label);
            });

            // Resultat tabel
            const resultsTable = document.getElementById('results-table');
            resultsTable.innerHTML = '';
            poll.dates.forEach(d => {
                const row = document.createElement('tr');
                row.className = 'border-b border-gray-800';
                row.innerHTML = `
                    <td class="py-3 font-medium">${formatDate(d.date)}</td>
                    <td class="py-3 text-gray-300 text-xs">${d.votes.length > 0 ? d.votes.join(', ') : '<span class="text-gray-500">Ingen endnu</span>'}</td>
                    <td class="py-3 text-center text-emerald-400 font-bold">${d.votes.length}</td>
                `;
                resultsTable.appendChild(row);
            });
        }

        async function submitVote() {
            const name = document.getElementById('voter-name').value.trim();
            if (!name) {
                alert('Skriv venligst dit navn!');
                return;
            }

            const checkboxes = document.querySelectorAll('.poll-checkbox:checked');
            const selectedDates = Array.from(checkboxes).map(c => c.value);

            const res = await fetch(`${API_URL}/api/polls/${pollId}/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, selectedDates })
            });

            if (res.ok) {
                alert('Din stemme er registreret!');
                loadPoll(pollId);
                document.getElementById('voter-name').value = '';
            }
        }

        function formatDate(dateStr) {
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            return new Date(dateStr).toLocaleDateString('da-DK', options);
        }
    </script>
</body>
</html>
